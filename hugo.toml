baseURL = 'https://painting.pixelastic.com/'
languageCode = 'en-us'
title = 'Pixelastic Painting Log'

[params]
description = "Documenting my journey through miniature painting and terrain building."
keywords = "terrain crafting, dungeon tiles, miniature painting, speedpaints, dip painting, dungeons and dragons, pathfinder, tabletop rpg, scatter terrain, foam crafting"

[build]
[build.buildStats]
# Generate ./hugo_stats.json
enable = true

[[build.cachebusters]]
# Whenever assets/hugo_stats.json is updated, rebuild CSS
target = "css"
source = "assets/hugo_stats\\.json"

[module]
# Make ./hugo_stats.json available as ./assets/hugo_stats.json
[[module.mounts]]
source = "assets"
target = "assets"
[[module.mounts]]
source = "hugo_stats.json"
target = "assets/hugo_stats.json"
disableWatch = true

[permalinks]
posts = '/:contentbasename/'

[pagination]
pagerSize = 12

[taxonomies]
tag = 'tags'

[outputs]
home = ['HTML', 'RSS']
section = ['HTML']
taxonomy = ['HTML']
term = ['HTML']

[markup]
[markup.goldmark]
[markup.goldmark.renderer]
unsafe = true # Allow HTML in markdown
[markup.highlight]
style = 'monokai'
