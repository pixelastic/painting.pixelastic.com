{{- define "main" }}

<div class="max-w-3xl mx-auto">
  <header class="mb-8">
    <h1 class="text-4xl font-bold text-default font-heading">All Tags</h1>
    <p class="mt-2 text-muted">Browse posts by topic</p>
  </header>

  <div class="space-y-4">
    {{- range .Pages }}
    <a href="{{ .Permalink }}" class="block p-6 transition-all card hover:border-accent/30 group">
      <div class="flex gap-3 items-center mb-3">
        {{- partial "icons/tag.html" (dict "class" "stroke-accent w-5 h-5") }}
        <h2 class="text-xl font-semibold text-default font-heading group-hover:text-accent">
          {{ .Title }}
        </h2>
      </div>
      <p class="text-sm text-muted">
        {{ .Pages | len }} {{ if eq (.Pages | len) 1 }}post{{ else }}posts{{ end }}
      </p>
    </a>
    {{- end }}
  </div>
</div>

{{- end }}
